<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
body{background:#F5F4F0;font-family:sans-serif;padding:40px}
.tools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;border:1px solid #ddd;border-radius:20px;overflow:hidden}
.tool-item{padding:28px 24px;background:#fff;display:flex;flex-direction:column;gap:10px}
.tool-ico{width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.tool-ico img{width:100%;height:100%;object-fit:contain;display:block}
</style></head><body>
<h1>Tool stack test</h1>
<div class="tools-grid">
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/figma.png" alt="Figma"></div><div>Figma</div></div>
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/miro.png" alt="Miro"></div><div>Miro</div></div>
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/illustrator.png" alt="Ai"></div><div>Illustrator</div></div>
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/xd.png" alt="Xd"></div><div>XD</div></div>
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/claude.png" alt="Claude"></div><div>Claude</div></div>
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/cursor.png" alt="Cursor"></div><div>Cursor</div></div>
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/vercel.png" alt="Vercel"></div><div>Vercel</div></div>
<div class="tool-item"><div class="tool-ico"><img src="../assets/tools/lovable.png" alt="Lovable"></div><div>Lovable</div></div>
</div>
</body></html>
